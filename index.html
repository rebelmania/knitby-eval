<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knitby Pattern Eval Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #7c6bf0;
      --green: #4caf50;
      --yellow: #ff9800;
      --red: #f44336;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    h2 { font-size: 1.1rem; }
    .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }
    .section-title { font-size: 1rem; margin: 32px 0 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      border-radius: 0;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .card-value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }

    /* Score bar */
    .score-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-dim);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover { background: var(--surface); }
    .score-cell { font-variant-numeric: tabular-nums; font-weight: 600; }

    /* Checkbox column */
    .cb-col { width: 36px; text-align: center; }
    .cb-col input { cursor: pointer; accent-color: var(--accent); width: 16px; height: 16px; }

    /* Detail panel */
    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-top: 24px;
      display: none;
    }
    .detail-panel.open { display: block; }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .dimension {
      margin-bottom: 16px;
      padding: 12px;
      background: var(--surface2);
      border-radius: 6px;
    }
    .dimension-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .dimension-name { font-weight: 600; font-size: 0.9rem; }
    .reasoning { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; }
    .issue-list { list-style: none; }
    .issue-list li {
      font-size: 0.8rem;
      color: var(--yellow);
      padding: 2px 0;
    }

    .actions { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: var(--red);
    }
    .selection-count {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .loading { text-align: center; padding: 40px; color: var(--text-dim); }
    .empty { text-align: center; padding: 40px; color: var(--text-dim); }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .status-evaluated { background: #1b3a1b; color: var(--green); }
    .status-pending { background: #3a2e1b; color: var(--yellow); }

    /* Config banner */
    .config-banner {
      background: var(--surface);
      border: 1px solid var(--yellow);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
    }
    .config-banner input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      width: 300px;
      margin: 4px 8px 4px 0;
      font-size: 0.85rem;
    }
    .config-banner label {
      display: block;
      margin-top: 8px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <h1>Knitby Pattern Eval Dashboard</h1>
  <p class="subtitle">LLM extraction quality scores — completeness, faithfulness, size resolution</p>

  <!-- Config -->
  <div id="config-banner" class="config-banner" style="display:none;">
    <strong>Configure Supabase connection</strong>
    <label>Supabase URL
      <input id="cfg-url" type="text" placeholder="https://xxx.supabase.co">
    </label>
    <label>Supabase Anon Key
      <input id="cfg-key" type="text" placeholder="eyJ...">
    </label>
    <label>Edge Function URL (for triggering evals)
      <input id="cfg-fn-url" type="text" placeholder="https://xxx.supabase.co/functions/v1/run-eval">
    </label>
    <button onclick="saveConfig()" style="margin-top:12px;">Save & Load</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('cached')">Cached Patterns</button>
    <button class="tab" onclick="switchTab('results')">Eval Results</button>
  </div>

  <!-- Tab 1: Cached patterns (pick which to evaluate) -->
  <div id="tab-cached" class="tab-content active">
    <div class="actions">
      <button id="btn-eval-selected" onclick="evalSelected()" disabled>Evaluate Selected</button>
      <button class="btn-secondary" onclick="loadCached()">Refresh</button>
      <span class="selection-count" id="selection-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="cb-col"><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"></th>
            <th>Pattern</th>
            <th>Sizes</th>
            <th>Model</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="cached-body">
          <tr><td colspan="5" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Tab 2: Eval results -->
  <div id="tab-results" class="tab-content">
    <div class="actions">
      <button class="btn-secondary" onclick="loadResults()">Refresh</button>
    </div>

    <div class="summary" id="summary"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Pattern</th>
            <th>Sizes</th>
            <th>Structural</th>
            <th>Completeness</th>
            <th>Faithfulness</th>
            <th>Size Res.</th>
            <th>Overall</th>
            <th>Evaluated</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <tr><td colspan="8" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <button class="close-btn" onclick="closeDetail()">x</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <script>
    let supabaseClient = null;
    let cachedPatterns = [];
    let evalData = [];
    let selectedHashes = new Set();

    // --- Config ---

    function getConfig() {
      const stored = localStorage.getItem('knitby-eval-config');
      return stored ? JSON.parse(stored) : null;
    }

    function saveConfig() {
      const url = document.getElementById('cfg-url').value.trim();
      const key = document.getElementById('cfg-key').value.trim();
      const fnUrl = document.getElementById('cfg-fn-url').value.trim();
      if (!url || !key) return alert('URL and Key are required');
      localStorage.setItem('knitby-eval-config', JSON.stringify({ url, key, fnUrl }));
      location.reload();
    }

    // --- Tabs ---

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
      closeDetail();
      if (tab === 'results') loadResults();
    }

    // --- Helpers ---

    function scoreColor(score) {
      if (score == null) return 'var(--text-dim)';
      if (score >= 0.85) return 'var(--green)';
      if (score >= 0.6) return 'var(--yellow)';
      return 'var(--red)';
    }

    function formatScore(score) {
      if (score == null) return '-';
      return (score * 100).toFixed(0) + '%';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    // --- Cached patterns tab ---

    async function loadCached() {
      const config = getConfig();
      if (!config?.fnUrl) {
        document.getElementById('cached-body').innerHTML =
          '<tr><td colspan="5" class="empty">Set the Edge Function URL in config first.</td></tr>';
        return;
      }
      try {
        const res = await fetch(config.fnUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${config.key}`,
          },
          body: JSON.stringify({ action: 'list' }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
        const result = await res.json();
        cachedPatterns = result.patterns || [];
        selectedHashes.clear();
        renderCachedTable();
      } catch (e) {
        console.error('Load cached failed:', e);
        document.getElementById('cached-body').innerHTML =
          `<tr><td colspan="5" class="empty">Failed to load: ${e.message}</td></tr>`;
      }
    }

    function renderCachedTable() {
      const tbody = document.getElementById('cached-body');
      if (!cachedPatterns.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No cached patterns with raw text found.</td></tr>';
        return;
      }

      tbody.innerHTML = cachedPatterns.map((p, i) => {
        const checked = selectedHashes.has(p.pdf_hash) ? 'checked' : '';
        const statusHtml = p.evaluated_at
          ? `<span class="status-badge status-evaluated">Evaluated ${timeAgo(p.evaluated_at)}</span>`
          : `<span class="status-badge status-pending">Not evaluated</span>`;
        return `<tr>
          <td class="cb-col"><input type="checkbox" ${checked} onchange="toggleSelect('${p.pdf_hash}', this)"></td>
          <td>${p.title}</td>
          <td>${p.sizes.length || '-'}</td>
          <td style="color:var(--text-dim)">${p.model_version || '-'}</td>
          <td>${statusHtml}</td>
        </tr>`;
      }).join('');

      updateSelectionCount();
    }

    function toggleSelect(hash, checkbox) {
      if (checkbox.checked) {
        selectedHashes.add(hash);
      } else {
        selectedHashes.delete(hash);
      }
      updateSelectionCount();
    }

    function toggleSelectAll(checkbox) {
      if (checkbox.checked) {
        cachedPatterns.forEach(p => selectedHashes.add(p.pdf_hash));
      } else {
        selectedHashes.clear();
      }
      renderCachedTable();
      document.getElementById('select-all').checked = checkbox.checked;
    }

    function updateSelectionCount() {
      const count = selectedHashes.size;
      document.getElementById('selection-count').textContent =
        count > 0 ? `${count} selected` : '';
      document.getElementById('btn-eval-selected').disabled = count === 0;
    }

    async function evalSelected() {
      const config = getConfig();
      if (!config?.fnUrl) {
        alert('Set the Edge Function URL in config first');
        return;
      }
      if (selectedHashes.size === 0) return;

      const btn = document.getElementById('btn-eval-selected');
      const hashes = [...selectedHashes];
      btn.disabled = true;
      btn.textContent = `Evaluating ${hashes.length}...`;

      let completed = 0;
      let failed = 0;

      // Evaluate one at a time to avoid timeout
      for (const hash of hashes) {
        try {
          btn.textContent = `Evaluating ${++completed}/${hashes.length}...`;
          const res = await fetch(config.fnUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${config.key}`,
            },
            body: JSON.stringify({ pdf_hash: hash, limit: 1 }),
          });
          if (!res.ok) {
            const text = await res.text();
            console.error(`Eval failed for ${hash}: ${text}`);
            failed++;
          }
        } catch (e) {
          console.error(`Eval failed for ${hash}:`, e);
          failed++;
        }
      }

      const msg = failed > 0
        ? `Done: ${completed - failed} succeeded, ${failed} failed`
        : `Done: ${completed} patterns evaluated`;
      alert(msg);

      selectedHashes.clear();
      btn.textContent = 'Evaluate Selected';
      btn.disabled = true;
      await loadCached();
    }

    // --- Results tab ---

    async function loadResults() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient
          .from('eval_results')
          .select('*')
          .order('evaluated_at', { ascending: false })
          .limit(50);

        if (error) throw error;
        evalData = data || [];
        renderSummary(evalData);
        renderResultsTable(evalData);
      } catch (e) {
        console.error('Load results failed:', e);
        document.getElementById('results-body').innerHTML =
          `<tr><td colspan="8" class="empty">Failed to load: ${e.message}</td></tr>`;
      }
    }

    function renderSummary(data) {
      const el = document.getElementById('summary');
      if (!data.length) { el.innerHTML = ''; return; }

      const avg = (field) => data.reduce((s, r) => s + (r[field] ?? 0), 0) / data.length;

      const metrics = [
        { label: 'Patterns', value: data.length, isCount: true },
        { label: 'Avg Overall', value: avg('overall_score') },
        { label: 'Avg Completeness', value: avg('completeness_score') },
        { label: 'Avg Faithfulness', value: avg('faithfulness_score') },
        { label: 'Avg Size Resolution', value: avg('size_resolution_score') },
        { label: 'Avg Structural', value: avg('structural_score') },
      ];

      el.innerHTML = metrics.map(m => {
        if (m.isCount) {
          return `<div class="card">
            <div class="card-label">${m.label}</div>
            <div class="card-value">${m.value}</div>
          </div>`;
        }
        const color = scoreColor(m.value);
        return `<div class="card">
          <div class="card-label">${m.label}</div>
          <div class="card-value" style="color:${color}">${formatScore(m.value)}</div>
          <div class="score-bar"><div class="score-fill" style="width:${m.value*100}%;background:${color}"></div></div>
        </div>`;
      }).join('');
    }

    function renderResultsTable(data) {
      const tbody = document.getElementById('results-body');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">No eval results yet. Go to Cached Patterns tab and select patterns to evaluate.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map((r, i) => `
        <tr style="cursor:pointer" onclick="showDetail(${i})">
          <td>${r.pattern_title || r.pdf_hash?.substring(0, 12) || '?'}</td>
          <td>${r.size_count ?? '-'}</td>
          <td class="score-cell" style="color:${scoreColor(r.structural_score)}">${formatScore(r.structural_score)}</td>
          <td class="score-cell" style="color:${scoreColor(r.completeness_score)}">${formatScore(r.completeness_score)}</td>
          <td class="score-cell" style="color:${scoreColor(r.faithfulness_score)}">${formatScore(r.faithfulness_score)}</td>
          <td class="score-cell" style="color:${scoreColor(r.size_resolution_score)}">${formatScore(r.size_resolution_score)}</td>
          <td class="score-cell" style="color:${scoreColor(r.overall_score)}">${formatScore(r.overall_score)}</td>
          <td style="color:var(--text-dim)">${timeAgo(r.evaluated_at)}</td>
        </tr>
      `).join('');
    }

    function showDetail(index) {
      const r = evalData[index];
      if (!r) return;

      document.getElementById('detail-title').textContent =
        r.pattern_title || r.pdf_hash?.substring(0, 12);

      const dims = [
        { name: 'Completeness', score: r.completeness_score, reasoning: r.completeness_reasoning, issues: r.completeness_issues },
        { name: 'Faithfulness', score: r.faithfulness_score, reasoning: r.faithfulness_reasoning, issues: r.faithfulness_issues },
        { name: 'Size Resolution', score: r.size_resolution_score, reasoning: r.size_resolution_reasoning, issues: r.size_resolution_issues },
        { name: 'Structural', score: r.structural_score, reasoning: null, issues: r.structural_issues },
      ];

      document.getElementById('detail-content').innerHTML = dims.map(d => {
        const color = scoreColor(d.score);
        const issueList = (d.issues ?? []);
        const issueItems = Array.isArray(issueList)
          ? issueList.map(i => typeof i === 'string' ? i : `[${i.severity}] ${i.code}: ${i.message}`).map(t => `<li>${t}</li>`).join('')
          : '';
        return `<div class="dimension">
          <div class="dimension-header">
            <span class="dimension-name">${d.name}</span>
            <span class="score-cell" style="color:${color}">${formatScore(d.score)}</span>
          </div>
          ${d.reasoning ? `<p class="reasoning">${d.reasoning}</p>` : ''}
          ${issueItems ? `<ul class="issue-list">${issueItems}</ul>` : ''}
        </div>`;
      }).join('');

      const panel = document.getElementById('detail-panel');
      panel.classList.add('open');
      panel.scrollIntoView({ behavior: 'smooth' });
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('open');
    }

    // --- Init ---

    (function init() {
      const config = getConfig();
      if (!config) {
        document.getElementById('config-banner').style.display = 'block';
        document.getElementById('cached-body').innerHTML =
          '<tr><td colspan="5" class="empty">Configure Supabase connection above to get started.</td></tr>';
        return;
      }

      supabaseClient = supabase.createClient(config.url, config.key);
      loadCached();
    })();
  </script>
</body>
</html>
